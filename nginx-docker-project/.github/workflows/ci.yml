
name: Portfolio CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker
        run: docker --version

      - name: Build Docker image
        run: docker build -t chinmay-portfolio .

      - name: Run container and verify
        run: |
          docker run -d -p 8080:80 chinmay-portfolio
          sleep 5
          curl -f http://localhost:8080
